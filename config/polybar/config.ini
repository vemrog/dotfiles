[colors]
background = #1C1B1A
foreground = #FFFCF0

[bar/main]
width = 100%
height = 38
bottom =  true
background = ${colors.background}
font-0 = "Fira Code:style=Regular:size=11;weight=bold"
font-1 = "Fira Code Nerd Font:style=Regular:size=13"
modules-right = volume 
modules-center = date-12
module-margin = 1
padding-left = 2
padding-right = 2

[module/volume]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
ramp-volume-0 = "󰕿"
ramp-volume-1 = "󰖀"
ramp-volume-2 = "󰕾"
label-muted = "󰖁"
click-right = pavucontrol &
label-volume = %percentage%%
use-ui-max = false

[module/date-12]
type = internal/date
interval = 1
date = "%I:%M%p"
date-alt = "%b %d (%a)"

label = %date%
label-foreground = ${colors.foreground}