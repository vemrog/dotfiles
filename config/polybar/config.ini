[colors]
background = #1C1B1A
foreground = #FFFCF0

[bar/main]
width = 100%
height = 40

bottom =  true
padding-left = 2
padding-right = 2
background = ${colors.background}

font-0 = "Fira Code:style=Regular:size=12;2"
font-1 = "Fira Code Nerd Font:style=Regular:size=12;1"

module-margin = 1
modules-right = battery volume
modules-center = date-12

[module/volume]
type = internal/pulseaudio
format-volume = <ramp-volume>
ramp-volume-0 = "َ°•؟"
ramp-volume-1 = "َ°–€"
ramp-volume-2 = "َ°•¾"
label-muted = "َ°–پ"
click-right = pavucontrol &
use-ui-max = false

[module/date-12]
type = internal/date
interval = 1
date = "%I:%M%p"
date-alt = "%b %d %a"

label = %date%
label-foreground = ${colors.foreground}

[module/battery]
